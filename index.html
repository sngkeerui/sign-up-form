<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Sign-up Form</title>
</head>
<body>
    <section class="hero-section">
        <img src="images/leaves.jpg" alt="a picture of leaves">
    </section>
    <section class="form-section">
        <section class="form-explanation">
            <p>This is not a real online service! You know you need something 
                like this on your life to help you realise your deepest dreams. 
                Sign up now to get started.
            </p>
            <p>You know you want to.</p>
        </section>
        <section class="form-container">
            <h2>Let's do this!</h2>
            <form action="#" method="post" id="sign-up-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">FIRST NAME</label>
                        <input type="text" name="user_first_name" id="first_name" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">LAST NAME</label>
                        <input type="text" name="user_last_name" id="last_name" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">EMAIL</label>
                        <input type="email" name="user_email" id="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="phone_number">PHONE NUMBER</label>
                        <input type="tel" name="user_phone_number" id="phone_number" pattern=""\+\d{1,3}\s\d{4}\s\d{4}" placeholder="+1 2345 6789" title="Format: +[CountryCode] [4 digits] [4 digits]" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="password">PASSWORD</label>
                        <input type="password" name="user_password" id="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">CONFIRM PASSWORD</label>
                        <input type="password" name="user_confirm_password" id="confirm_password" required>
                    </div>
                </div>
            </form>
        </section>
        <section class="form-submit">
            <button type="submit" form="sign-up-form">Create Account</button>
            <p>Already have an account? <a href="#" id="login">Log in</a></p>
        </section>
    </section>
</body>
</html>
